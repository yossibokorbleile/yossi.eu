# Build Hugo site and push to deploy repo
name: Deploy Hugo site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.145.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout teaching resources
        uses: actions/checkout@v4
        with:
          repository: yossibokorbleile/teaching-resources
          token: ${{ secrets.TEACHINGRESOURCESDEPLOY }}
          path: teaching-resources

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "https://yossi.eu/"

      - name: Copy teaching resources into build
        run: |
          mkdir -p public/teaching
          cp teaching-resources/index.html public/teaching/
          cp -r teaching-resources/demos public/teaching/
          cp -r teaching-resources/ista public/teaching/ista

      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: yossibokorbleile/yossi-eu-deploy
          token: ${{ secrets.DEPLOYTOKEN }}
          path: deploy

      - name: Update site files
        run: |
          rm -rf deploy/sites/yossi.eu/*
          cp -r ./public/* deploy/sites/yossi.eu/

      - name: Push to deploy repo
        run: |
          cd deploy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update yossi.eu"
          git push
